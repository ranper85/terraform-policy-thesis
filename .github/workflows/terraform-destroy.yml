name: Terraform Destroy

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Terraform Destroy — Compliant Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Azure Login (OIDC)
        uses: azure/login@v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0

      - name: Terraform Init
        working-directory: terraform/compliant
        run: terraform init

      - name: Terraform Destroy
        working-directory: terraform/compliant
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_principal_id: ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_sql_admin_password: ${{ secrets.TF_VAR_sql_admin_password }}
          TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_ssh_public_key }}
        run: terraform destroy -auto-approve
